name: CLV capture (T-5min closing lines)

on:
  schedule:
    # Every 5 min during game windows (6pm-11pm ET = 22:00-03:00 UTC)
    - cron: '*/5 22,23,0,1,2,3 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Refresh schedule
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/ingest-nhl-schedule.js

      - name: Capture CLV for games in window
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/capture-clv.js

      - name: Commit
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "clv capture $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No CLV captures in this window"
          fi
