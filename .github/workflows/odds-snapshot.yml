name: Odds snapshot

on:
  schedule:
    # Every 15 min between 4pm and 2am ET (20:00-06:00 UTC), daily
    - cron: '*/15 20,21,22,23,0,1,2,3,4,5 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Ingest odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/ingest-odds.js

      - name: Commit snapshots
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/ data/manifest/ data/derived/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "odds snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit"
          fi
