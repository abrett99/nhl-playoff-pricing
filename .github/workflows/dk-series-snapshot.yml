name: DraftKings series props snapshot

on:
  schedule:
    # Every 30 min during active playoff windows (4pm-2am ET = 20:00-06:00 UTC)
    - cron: '*/30 20,21,22,23,0,1,2,3,4,5 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Ingest DK series props
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/ingest-draftkings.js
        continue-on-error: true  # DK sometimes returns empty offseason; non-fatal

      - name: Commit
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "dk series props $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No DK changes"
          fi
