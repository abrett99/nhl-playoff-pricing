name: Playoff results

on:
  schedule:
    # Every 15 min during game windows (7pm-2am ET = 23:00-06:00 UTC)
    - cron: '*/15 23,0,1,2,3,4,5 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Ingest schedule
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/ingest-nhl-schedule.js

      - name: Update series state from completed games
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/update-series-state.js

      - name: Rebuild features for next games
        run: node scripts/build-features.js

      - name: Commit state changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "playoff state update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No state changes"
          fi
